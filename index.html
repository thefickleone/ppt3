<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motional EMF - Cinematic Presentation</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="presentation" aria-label="Motional EMF cinematic scene">
      <div id="background" class="layer" aria-hidden="true">
        <div class="bg-gradient"></div>
        <div class="bg-grid"></div>
      </div>

      <section id="scene" class="layer" aria-label="Physics scene">
        <svg
          id="sceneSvg"
          viewBox="0 0 1200 675"
          preserveAspectRatio="xMidYMid slice"
          role="img"
          aria-label="Motional EMF visual scene canvas"
        ></svg>
      </section>

      <div id="storyPanel" class="layer">
        <h1 id="title">Motional EMF</h1>
        <p id="subtitle">How does motion become electricity?</p>
        <div id="explanation">A conductor moving through a magnetic field separates charge and creates voltage.</div>
      </div>

      <section id="examplesCards" class="layer" aria-label="Real-world motional EMF systems">
        <article class="example-card">
          <img src="https://images.unsplash.com/photo-1473341304170-971dccb5ac1e?auto=format&fit=crop&w=900&q=80" alt="Electric generator rotor assembly" />
          <h3>Generator</h3>
        </article>
        <article class="example-card">
          <img src="https://images.unsplash.com/photo-1467533003447-e295ff1b0435?auto=format&fit=crop&w=900&q=80" alt="Wind turbine producing electrical power" />
          <h3>Turbine</h3>
        </article>
        <article class="example-card">
          <img src="https://images.unsplash.com/photo-1489515217757-5fd1be406fef?auto=format&fit=crop&w=900&q=80" alt="Bicycle dynamo and wheel system" />
          <h3>Dynamo</h3>
        </article>
      </section>

      <aside id="ui" class="layer" aria-label="Presentation controls and progress">
        <div id="progress">
          <span class="label">Step</span>
          <span id="stepValue">0 / 11</span>
        </div>
        <div id="hint">Right Arrow / Space: Next page &middot; Left Arrow: Previous page &middot; R: Reload</div>
      </aside>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
